name: scrape-fanza-daily

on:
  schedule:
    # UTC 20:15 = JST 05:15（DLsite の15分後）
    - cron: '15 20 * * *'
  workflow_dispatch:

concurrency:
  group: fanza-daily
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run scraper (fanza daily)
        run: |
          # Fanza は売上反映が遅れることがあるため、直近3日を毎日再UPSERTする
          FROM="$(date -u -d '2 days ago' +%F)"
          TO="$(date -u +%F)"
          npm run scraper:backfill -- fanza --from="$FROM" --to="$TO" --unit=daily
        env:
          FANZA_USERNAME: ${{ secrets.FANZA_USERNAME }}
          FANZA_PASSWORD: ${{ secrets.FANZA_PASSWORD }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          USD_JPY_RATE: ${{ vars.USD_JPY_RATE || '150' }}
      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fanza-daily-failure-${{ github.run_id }}
          path: |
            test-results/
            playwright-report/
          retention-days: 14

      - name: Revalidate Vercel cache
        if: success()
        run: |
          curl -s -X POST https://bisque-sales-analytics.vercel.app/api/cron/revalidate \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{"tags":["sales-data"]}' || true
